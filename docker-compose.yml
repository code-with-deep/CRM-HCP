services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-hcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm_hcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm_hcp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
